<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinAI | Secure Access</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .brand-logo {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .brand-subtitle {
            font-size: 1.2rem;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <!-- Left Side: Brand -->
        <div class="login-brand">
            <h1 class="brand-logo">SENTIN<span
                    style="color: var(--primary-blue); -webkit-text-fill-color: initial;">AI</span></h1>
            <p class="brand-subtitle">Autonomous Threat Defense</p>
            <div style="margin-top: 40px; display: flex; gap: 20px;">
                <div class="card glass" style="text-align: center;">
                    <div style="font-size: 2rem;">🛡️</div>
                    <div style="margin-top: 10px; color: var(--text-muted);">SQLi Protection</div>
                </div>
                <div class="card glass" style="text-align: center;">
                    <div style="font-size: 2rem;">🧠</div>
                    <div style="margin-top: 10px; color: var(--text-muted);">AI Powered</div>
                </div>
                <div class="card glass" style="text-align: center;">
                    <div style="font-size: 2rem;">⚡</div>
                    <div style="margin-top: 10px; color: var(--text-muted);">Real-time</div>
                </div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="login-form-container">
            <div style="width: 100%; max-width: 350px;">
                <div style="margin-bottom: 30px;">
                    <h2 style="font-size: 2rem; margin-bottom: 10px;">Welcome Back</h2>
                    <p style="color: var(--text-muted);">Enter your credentials to access the command center.</p>
                </div>

                {% if error %}
                <div class="card"
                    style="background: rgba(255, 42, 109, 0.1); border-color: var(--primary-red); color: var(--primary-red); margin-bottom: 20px; padding: 15px;">
                    ⚠️ {{ error }}
                </div>
                {% endif %}

                <form action="/login" method="POST">
                    <div class="input-group">
                        <input type="text" name="username" class="input-field" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" class="input-field" placeholder="Password" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">AUTHENTICATE</button>
                </form>

                <div style="margin-top: 30px; text-align: center;">
                    <span class="mono" style="font-size: 0.8rem; color: var(--border-color);">SECURE CONNECTION // TLS
                        1.3</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
