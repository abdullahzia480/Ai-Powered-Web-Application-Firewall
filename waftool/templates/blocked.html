<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blocked | SentinAI Security</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --accent-red: #ef4444;
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .icon {
            width: 64px;
            height: 64px;
            background: #fef2f2;
            color: var(--accent-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon svg {
            width: 32px;
            height: 32px;
            stroke-width: 2;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        p {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .details-box {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 24px;
            text-align: left;
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .detail-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .value {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-primary);
        }

        .footer {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 24px;
        }

        .payload-preview {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            color: var(--accent-red);
            background: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #fee2e2;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">
            <!-- Shield Alert Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>

        <h1>Request Blocked</h1>
        <p>
            The SentinAI Web Application Firewall blocked this request due to malicious activity detection.
            Your IP address has been logged.
        </p>

        <div class="details-box">
            <div class="detail-row">
                <span class="label">Event ID</span>
                <span class="value">{{ timestamp }}</span>
            </div>
            <div class="detail-row">
                <span class="label">Source IP</span>
                <span class="value">{{ ip }}</span>
            </div>
            <div class="detail-row">
                <span class="label">Reason</span>
                <span class="value" style="color: var(--accent-red);">Malicious Payload Detected</span>
            </div>
            <div class="detail-row">
                <span class="label" style="align-self: flex-start; margin-top:2px;">Payload</span>
                <span class="value payload-preview">{{ payload }}</span>
            </div>
        </div>

        <div class="footer">
            Protected by <strong>SentinAI™ WAF</strong> • Verdict Engine v3.0
        </div>
    </div>
</body>

</html>
