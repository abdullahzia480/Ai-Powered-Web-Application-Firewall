<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAF Master Logs</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --card-bg: #ffffff;
            --sidebar-bg: #1e293b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: #334155;
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }

        /* Sidebar Copy from Dashboard */
        .sidebar {
            background-color: var(--sidebar-bg);
            color: white;
            padding: 1.5rem 1rem;
            position: fixed;
            height: 100vh;
            width: 240px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .logo-icon {
            background: var(--primary);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #cbd5e1;
            text-decoration: none;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        a {
            text-decoration: none;
        }

        .main-content {
            grid-column: 2;
            padding: 2rem;
        }

        /* Log Specific Styles */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
        }

        .logs-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .logs-toolbar {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-list {
            max-height: 80vh;
            overflow-y: auto;
            padding: 0;
            margin: 0;
        }

        .log-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.875rem;
            line-height: 1.5;
            transition: background 0.1s;
        }

        .log-item:hover {
            background: #f8fafc;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .badge {
            flex-shrink: 0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            width: 80px;
            text-align: center;
        }

        .badge.blocked {
            background: #fee2e2;
            color: var(--danger);
        }

        .badge.safe {
            background: #dcfce7;
            color: var(--success);
        }

        .raw-text {
            font-family: 'JetBrains Mono', monospace;
            color: #475569;
            word-break: break-all;
        }

        @media (max-width: 1024px) {
            body {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .main-content {
                grid-column: 1;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">WAF</div>
            <h2 style="font-size: 1.25rem;">SentinAI</h2>
        </div>
        <div class="nav-menu">
            <a href="/waf/dashboard">
                <div class="nav-item">
                    <span>Dashboard</span>
                </div>
            </a>
            <div class="nav-item">
                <span>Traffic Analysis</span>
            </div>
            <a href="/waf/logs_view">
                <div class="nav-item active">
                    <!-- Added active class here -->
                    <span>Logs</span>
                </div>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Master Traffic Logs</h1>
            <button onclick="window.location.reload()"
                style="padding: 8px 16px; background:white; border:1px solid var(--border); border-radius:6px; cursor:pointer; font-weight:500;">Refresh
                Data</button>
        </div>

        <div class="logs-card">
            <div class="logs-toolbar">
                <div style="font-size:0.875rem; color:var(--secondary);">Showing latest {{ logs|length }} entries</div>
                <div style="font-size:0.75rem; color:var(--secondary);">Format: Apache/Combined</div>
            </div>
            <div class="log-list">
                {% for log in logs %}
                <div class="log-item">
                    <div class="badge {{ 'blocked' if log.status == 'BLOCKED' else 'safe' }}">
                        {{ log.status }}
                    </div>
                    <div class="raw-text">
                        {{ log.line }}
                    </div>
                </div>
                {% endfor %}

                {% if not logs %}
                <div style="padding: 2rem; text-align: center; color: var(--secondary);">
                    No logs recorded yet.
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>

</html>
